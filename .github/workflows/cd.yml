name: CD

on:
  release:
    types:
      - published

jobs:
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download build artifact from release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });

            const asset = release.data.assets.find(a => a.name.endsWith('.zip'));
            if (!asset) {
              throw new Error('No build artifact (.zip) found on release ' + context.payload.release.tag_name);
            }

            const download = await github.rest.repos.getReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id,
              headers: { Accept: 'application/octet-stream' }
            });

            fs.writeFileSync('admin-build.zip', Buffer.from(download.data));
            console.log(`Downloaded ${asset.name} (${download.data.byteLength} bytes)`);

      - name: Extract build artifact
        run: |
          mkdir -p dist/admin/browser
          unzip admin-build.zip -d dist/admin/browser
          rm admin-build.zip

      - name: Write runtime app config
        shell: bash
        env:
          API_URL: ${{ vars.API_URI  }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "API_URI GitHub variable is not set for this environment."
            exit 1
          fi

          CONFIG_PATH="dist/admin/browser/app-config.json"

          if [ ! -f "$CONFIG_PATH" ]; then
            echo '{}' > "$CONFIG_PATH"
          fi

          jq --arg apiUrl "$API_URL" '.apiUrl = $apiUrl' "$CONFIG_PATH" > "$CONFIG_PATH.tmp"
          mv "$CONFIG_PATH.tmp" "$CONFIG_PATH"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: dist/admin/browser
