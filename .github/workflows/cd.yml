name: CD

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: admin-build
          path: dist/admin/browser
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write runtime app config
        shell: bash
        env:
          API_URL: ${{ vars.API_URI  }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "API_URI GitHub variable is not set for this environment."
            exit 1
          fi

          CONFIG_PATH="dist/admin/browser/app-config.json"

          if [ ! -f "$CONFIG_PATH" ]; then
            echo '{}' > "$CONFIG_PATH"
          fi

          jq --arg apiUrl "$API_URL" '.apiUrl = $apiUrl' "$CONFIG_PATH" > "$CONFIG_PATH.tmp"
          mv "$CONFIG_PATH.tmp" "$CONFIG_PATH"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: dist/admin/browser
