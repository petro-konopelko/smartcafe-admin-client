name: CD

on:
  release:
    types:
      - published

jobs:
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download build artifact from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "Waiting for build artifact to be attached to release ${TAG}..."
          for attempt in $(seq 1 10); do
            ASSET=$(gh release view "$TAG" \
              --json assets \
              --jq '.assets[] | select(.name | endswith(".zip")) | .name' \
              --repo ${{ github.repository }} 2>/dev/null || true)
            if [ -n "$ASSET" ]; then
              echo "Found asset: ${ASSET}"
              gh release download "$TAG" \
                --pattern "$ASSET" \
                --output admin-build.zip \
                --repo ${{ github.repository }}
              exit 0
            fi
            echo "Attempt ${attempt}/10: asset not yet available, retrying in 30s..."
            sleep 30
          done
          echo "Timed out waiting for release asset after 5 minutes"
          exit 1

      - name: Extract build artifact
        run: |
          mkdir -p dist/admin/browser
          unzip admin-build.zip -d dist/admin/browser
          rm admin-build.zip

      - name: Write runtime app config
        shell: bash
        env:
          API_URL: ${{ vars.API_URI  }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "API_URI GitHub variable is not set for this environment."
            exit 1
          fi

          CONFIG_PATH="dist/admin/browser/app-config.json"

          if [ ! -f "$CONFIG_PATH" ]; then
            echo '{}' > "$CONFIG_PATH"
          fi

          jq --arg apiUrl "$API_URL" '.apiUrl = $apiUrl' "$CONFIG_PATH" > "$CONFIG_PATH.tmp"
          mv "$CONFIG_PATH.tmp" "$CONFIG_PATH"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: dist/admin/browser
