name: CI

on:
  push:
    branches:
      - main

concurrency:
  group: ci-main
  cancel-in-progress: false

jobs:
  validate:
    name: Lint, Test & Build (all)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint (all)
        run: npm run lint:ci

      - name: Test (all)
        run: npm run test:ci

      - name: Build (all)
        run: npm run build:ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: dist/admin/browser
          retention-days: 1
