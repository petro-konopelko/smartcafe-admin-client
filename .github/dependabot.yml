version: 2

updates:
  # npm updates run twice a week (Tuesday and Friday).
  # Dependabot does not support multiple days in a single entry, so both
  # entries below must be kept in sync whenever group patterns or settings change.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
          - '@schematics/angular'
      nx:
        patterns:
          - 'nx'
          - '@nx/*'
      ngrx:
        patterns:
          - '@ngrx/*'
      ngx-translate:
        patterns:
          - '@ngx-translate/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'angular-eslint'
          - '@angular-eslint/*'
      stylelint:
        patterns:
          - 'stylelint'
          - 'stylelint-*'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - '@analogjs/storybook-angular'
          - 'eslint-plugin-storybook'
      analogjs:
        patterns:
          - '@analogjs/*'
        exclude-patterns:
          - '@analogjs/storybook-angular'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      swc:
        patterns:
          - '@swc/*'
          - '@swc-node/*'
      playwright:
        patterns:
          - '@playwright/*'
      typescript:
        patterns:
          - 'typescript'
          - 'tslib'
          - 'ts-node'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: friday
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
          - '@schematics/angular'
      nx:
        patterns:
          - 'nx'
          - '@nx/*'
      ngrx:
        patterns:
          - '@ngrx/*'
      ngx-translate:
        patterns:
          - '@ngx-translate/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'angular-eslint'
          - '@angular-eslint/*'
      stylelint:
        patterns:
          - 'stylelint'
          - 'stylelint-*'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - '@analogjs/storybook-angular'
          - 'eslint-plugin-storybook'
      analogjs:
        patterns:
          - '@analogjs/*'
        exclude-patterns:
          - '@analogjs/storybook-angular'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      swc:
        patterns:
          - '@swc/*'
          - '@swc-node/*'
      playwright:
        patterns:
          - '@playwright/*'
      typescript:
        patterns:
          - 'typescript'
          - 'tslib'
          - 'ts-node'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
