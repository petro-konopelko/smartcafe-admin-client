<div class="page-header">
  <h1>{{ 'cafes.title' | translate }}</h1>
  <button
    matButton="elevated"
    (click)="onCreateCafe()"
    [attr.aria-label]="'cafes.create' | translate"
    data-testid="create-cafe-button"
  >
    <mat-icon>add</mat-icon>
    {{ 'cafes.create' | translate }}
  </button>
</div>

<sc-content-container
  [loading]="cafeStore.loading()"
  [empty]="!cafeStore.hasCafes()"
  [emptyTitle]="'cafes.noCafes' | translate"
  [emptyMessage]="'cafes.createFirst' | translate"
  emptyIcon="store"
>
  <div class="table-container">
    <table
      mat-table
      [dataSource]="cafeStore.cafes()"
    >
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th
          mat-header-cell
          *matHeaderCellDef
        >
          {{ 'cafes.name' | translate }}
        </th>
        <td
          mat-cell
          *matCellDef="let cafe"
          [attr.data-label]="'cafes.name' | translate"
        >
          <strong data-testid="cafe-name">{{ cafe.name }}</strong>
        </td>
      </ng-container>

      <!-- Contact Column -->
      <ng-container matColumnDef="contact">
        <th
          mat-header-cell
          *matHeaderCellDef
        >
          {{ 'cafes.contact' | translate }}
        </th>
        <td
          mat-cell
          *matCellDef="let cafe"
          [attr.data-label]="'cafes.contact' | translate"
        >
          {{ cafe.contactInfo || '—' }}
        </td>
      </ng-container>

      <!-- Created Column -->
      <ng-container matColumnDef="created">
        <th
          mat-header-cell
          *matHeaderCellDef
        >
          {{ 'common.created' | translate }}
        </th>
        <td
          mat-cell
          *matCellDef="let cafe"
          [attr.data-label]="'common.created' | translate"
        >
          {{ cafe.createdAt | scLocalDate }}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th
          mat-header-cell
          *matHeaderCellDef
          class="actions-column"
        >
          {{ 'common.actions' | translate }}
        </th>
        <td
          mat-cell
          *matCellDef="let cafe"
          [attr.data-testid]="'cafe-row-' + cafe.id"
        >
          <div class="action-buttons">
            <button
              matIconButton
              (click)="onViewMenus(cafe)"
              [attr.aria-label]="'menus.view' | translate"
              [matTooltip]="'menus.view' | translate"
              data-testid="view-menus-button"
            >
              <mat-icon>restaurant_menu</mat-icon>
            </button>
            <button
              matIconButton
              (click)="onDeleteCafe(cafe)"
              [attr.aria-label]="'cafes.delete' | translate"
              [matTooltip]="'cafes.delete' | translate"
              data-testid="delete-cafe-button"
            >
              <mat-icon class="icon-error">delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns"
      ></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
      ></tr>
    </table>
  </div>
</sc-content-container>
